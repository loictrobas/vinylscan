services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vinylscan
      POSTGRES_PASSWORD: vinylscan
      POSTGRES_DB: vinylscan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vinylscan:vinylscan@db/vinylscan
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      # Note: volume mount shadows Dockerfile COPY in dev — that's intentional (hot reload).
      # Production build uses COPY only (no volume).
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
