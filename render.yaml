services:
  - type: web
    name: vinylscan-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: sh -c "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinylscan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DISCOGS_CONSUMER_KEY
        sync: false
      - key: DISCOGS_CONSUMER_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: DEV_MODE
        value: "false"
      # Stripe billing and R2 image storage are optional integrations the code
      # already falls back gracefully without (Stripe routes just won't work;
      # images save to local disk). Dropped from the blueprint so sync doesn't
      # block on inputs that don't apply to this deploy.

databases:
  - name: vinylscan-db
    plan: free
    databaseName: vinylscan
    user: vinylscan
