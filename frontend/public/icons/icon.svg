<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Outer vinyl ring -->
  <circle cx="256" cy="256" r="220" fill="#1a1a1a"/>
  <!-- Groove rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Label area -->
  <circle cx="256" cy="256" r="110" fill="#e63946"/>
  <!-- Inner label detail -->
  <circle cx="256" cy="256" r="80" fill="#c1121f"/>
  <!-- Center hole -->
  <circle cx="256" cy="256" r="18" fill="#0a0a0a"/>
  <!-- Highlight arc -->
  <path d="M 140 180 A 130 130 0 0 1 372 180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="20" stroke-linecap="round"/>
</svg>
